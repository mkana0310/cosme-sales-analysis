<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>コスメ売上分析</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#5d8a68;--pl:#d5e8d4;--pd:#3e6b4e;--bg:#f5f7f5;--card:#fff;--t:#2d3a2e;--tl:#8a9a8c;--bd:#dde8dd;--ok:#43a047;--warn:#d4860b;--ng:#c0392b;--info:#3a7d6e}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;padding-bottom:60px;font-size:14px;-webkit-text-size-adjust:100%}

/* Header */
.hd{background:var(--p);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:100}
.hd h1{font-size:15px;font-weight:700}

/* Nav */
.bn{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;box-shadow:0 -1px 6px rgba(0,0,0,.08);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 4px;font-size:9px;color:#aaa;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
.ni.on{color:var(--p)}.ni svg{width:22px;height:22px;margin-bottom:2px}

/* Pages */
.pg{display:none;padding:12px 12px 20px}.pg.on{display:block}

/* Cards */
.c{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ct{font-size:11px;font-weight:600;color:var(--tl);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}

/* KPI boxes */
.kg{display:grid;gap:6px}
.kb{background:var(--bg);border-radius:10px;padding:10px 6px;text-align:center}
.kl{font-size:9px;color:var(--tl);margin-bottom:2px}.kv{font-size:17px;font-weight:800}.ks{font-size:9px;color:var(--tl);margin-top:2px}
.kv.ok{color:var(--ok)}.kv.warn{color:var(--warn)}.kv.ng{color:var(--ng)}

/* Progress */
.pb{width:100%;height:8px;background:#eee;border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .4s}
.pl{display:flex;justify-content:space-between;font-size:10px;color:var(--tl);margin-top:4px}

/* Forms */
.fg{margin-bottom:10px}.fl{display:block;font-size:11px;font-weight:600;margin-bottom:4px;color:#666}
.fi{width:100%;padding:10px;border:1.5px solid var(--bd);border-radius:10px;font-size:16px;background:#fff;-webkit-appearance:none}
.fi:focus{outline:none;border-color:var(--p)}
textarea.fi{resize:vertical;min-height:50px;font-size:13px;font-family:inherit}
.fr{display:flex;gap:8px}.fr .fg{flex:1}
.hint{font-size:9px;color:var(--tl);font-weight:400}

/* Buttons */
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.8}.bp{background:var(--p);color:#fff}.bs2{background:#eee;color:var(--t)}.bd2{background:var(--ng);color:#fff}
.bsm{display:inline-block;width:auto;padding:6px 14px;font-size:12px;border-radius:8px}

/* Tables */
.dt{width:100%;border-collapse:collapse;font-size:11px}
.dt th{text-align:left;padding:6px 3px;border-bottom:2px solid var(--bd);font-weight:600;color:var(--tl);font-size:9px;white-space:nowrap}
.dt td{padding:7px 3px;border-bottom:1px solid #f0f0f0}.dt .n{text-align:right;font-variant-numeric:tabular-nums}
.dt .pos{color:var(--ok)}.dt .neg{color:var(--ng)}

/* Tags */
.tg{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.tg-up{background:#e8f5e9;color:var(--ok)}.tg-dn{background:#ffebee;color:var(--ng)}

/* Tabs */
.tabs{display:flex;margin-bottom:12px;background:#eee;border-radius:10px;padding:3px}
.tab{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:600;border:none;background:none;border-radius:8px;cursor:pointer;color:var(--tl)}
.tab.on{background:#fff;color:var(--t);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* Month selector */
.ms{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px}
.ms button{width:36px;height:36px;border-radius:50%;border:none;background:#eee;font-size:16px;cursor:pointer}
.ms .cur{font-size:15px;font-weight:700}

/* Action effect */
.ae{border-radius:10px;padding:10px 12px;margin-bottom:6px}
.ae-act{font-size:12px;font-weight:700;margin-bottom:3px}
.ae-kpi{display:flex;align-items:center;gap:6px;font-size:13px}
.ae-trend{font-weight:800;font-size:15px}

/* Suggestion */
.sug{padding:10px 12px;border-radius:10px;margin-bottom:6px;font-size:12px}
.sug-t{font-weight:700;margin-bottom:2px}.sug-b{font-size:11px;color:#666;line-height:1.5}

/* Promo */
.promo-bar{background:linear-gradient(135deg,#e3f2fd,#e8eaf6);border-radius:10px;padding:10px 14px;margin-bottom:8px}
.promo-name{font-weight:700;font-size:13px;color:var(--info)}.promo-date{font-size:10px;color:var(--tl)}

/* Chips */
.chip-c{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--pl);border-radius:14px;font-size:11px}
.chip-x{border:none;background:none;font-size:14px;cursor:pointer;color:var(--pd)}

/* Misc */
.del{border:none;background:none;color:var(--ng);font-size:16px;cursor:pointer;padding:4px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mb8{margin-bottom:8px}
.ts{font-size:11px}.ttl{color:var(--tl)}.tc{text-align:center}
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.ab{background:var(--bg);border-radius:8px;padding:8px;text-align:center}
.al{font-size:8px;color:var(--tl)}.av{font-size:14px;font-weight:700;margin-top:2px}
.fold{background:none;border:none;color:var(--info);font-size:12px;cursor:pointer;padding:6px 0}
/* Bulk */
.bk-i{width:48px;padding:4px;font-size:12px;border:1px solid var(--bd);border-radius:4px;text-align:right;-webkit-appearance:none}
.bk-i:focus{border-color:var(--p);outline:none}
/* Report */
.rpt-box{background:#f8f8f8;border:1px solid var(--bd);border-radius:10px;padding:12px;font-size:11px;line-height:1.7;white-space:pre-wrap;font-family:inherit;max-height:50vh;overflow-y:auto}
.copy-btn{float:right;background:var(--p);color:#fff;border:none;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
/* Accordion */
.acc-hd{display:flex;justify-content:space-between;align-items:center;width:100%;background:none;border:none;padding:0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.acc-arr{color:var(--tl);font-size:12px;transition:transform .2s;flex-shrink:0}
/* Focus card */
.focus-num{font-size:22px;font-weight:800;line-height:1.1}
.focus-sub{font-size:11px;color:var(--tl);margin-top:2px}
.focus-action{background:var(--pl);border-radius:10px;padding:10px 12px;margin-top:8px}
.focus-action-lbl{font-size:9px;font-weight:700;color:var(--pd);letter-spacing:.5px;margin-bottom:3px;text-transform:uppercase}
.focus-action-txt{font-size:13px;font-weight:700;color:var(--t);line-height:1.4}
.focus-2nd{background:#f5f5f5;border-radius:8px;padding:8px 10px;margin-top:6px;font-size:11px}
/* Funnel flow */
.funnel{display:flex;align-items:flex-end;overflow-x:auto;padding:4px 0 2px;-ms-overflow-style:none;scrollbar-width:none}
.funnel::-webkit-scrollbar{display:none}
.fn-step{flex:1;min-width:40px;text-align:center;padding:0 1px}
.fn-lbl{font-size:8px;color:var(--tl);white-space:nowrap;margin-bottom:2px}
.fn-val{font-size:11px;font-weight:800;line-height:1.2}
.fn-mrk{font-size:11px;margin-top:1px}
.fn-arrow{color:#ccc;font-size:14px;padding-bottom:10px;flex-shrink:0;align-self:flex-end}
</style>
</head>
<body>
<div class="hd"><h1>コスメ売上分析</h1></div>

<!-- ===== HOME ===== -->
<div id="pg-home" class="pg on">
  <div class="ms"><button onclick="chMo(-1)">&lt;</button><span class="cur" id="d-mo"></span><button onclick="chMo(1)">&gt;</button></div>

  <!-- 1. Today's Focus -->
  <div class="c" style="border-left:4px solid var(--p)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div class="ct" style="margin:0" id="focus-title">今日のフォーカス</div>
      <div class="ms" style="margin:0;gap:4px">
        <button onclick="chFocus(-1)" style="font-size:11px;padding:2px 8px">&lt;</button>
        <span id="focus-date-lbl" style="font-size:11px;font-weight:600;min-width:60px;text-align:center"></span>
        <button onclick="chFocus(1)" style="font-size:11px;padding:2px 8px">&gt;</button>
        <button onclick="chFocus(0)" style="font-size:9px;padding:2px 6px;background:var(--p);color:#fff;border:none;border-radius:4px">今日</button>
      </div>
    </div>
    <div id="focus-content"></div>
  </div>

  <!-- 2. Budget Progress -->
  <div class="c">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="ct" style="margin:0">予算進捗</div>
      <div style="display:flex;gap:4px"><button class="bsm bs2 ptab" data-pg="bdg" onclick="setPeriod('bdg','year')" style="font-size:9px;padding:3px 8px">年</button><button class="bsm bs2 ptab" data-pg="bdg" onclick="setPeriod('bdg','month')" style="font-size:9px;padding:3px 8px">月</button><button class="bsm bp ptab" data-pg="bdg" onclick="setPeriod('bdg','week')" style="font-size:9px;padding:3px 8px">今週</button><button class="bsm bs2 ptab" data-pg="bdg" onclick="setPeriod('bdg','prevweek')" style="font-size:9px;padding:3px 8px">前週</button></div>
    </div>
    <div id="budget-trk"></div>
  </div>

  <!-- 3. Action Effect (collapsible) -->
  <div class="c">
    <button class="acc-hd" onclick="toggleAcc('action-fx-body','action-fx-arr')">
      <div style="display:flex;justify-content:space-between;align-items:center;width:100%">
        <span class="ct" style="margin:0">アクション効果</span>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="display:flex;gap:4px" onclick="event.stopPropagation()">
            <button class="bsm bp ptab" data-pg="afx" onclick="setAfxPeriod('week')" style="font-size:9px;padding:3px 8px">今週</button>
            <button class="bsm bs2 ptab" data-pg="afx" onclick="setAfxPeriod('prev')" style="font-size:9px;padding:3px 8px">前週</button>
          </div>
          <span id="action-fx-arr" class="acc-arr">▼</span>
        </div>
      </div>
    </button>
    <div id="action-fx-body" style="margin-top:8px">
      <div id="action-fx"></div>
    </div>
  </div>

  <!-- 4. Funnel Flow + KPI/接客指標 detail -->
  <div class="c">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div class="ct" style="margin:0">接客フロー</div>
      <div style="display:flex;gap:4px">
        <button class="bsm bs2 ptab" data-pg="kpi" onclick="setPeriod('kpi','month')" style="font-size:9px;padding:3px 8px">月</button>
        <button class="bsm bp ptab" data-pg="kpi" onclick="setPeriod('kpi','week')" style="font-size:9px;padding:3px 8px">今週</button>
        <button class="bsm bs2 ptab" data-pg="kpi" onclick="setPeriod('kpi','prevweek')" style="font-size:9px;padding:3px 8px">前週</button>
      </div>
    </div>
    <div id="funnel-flow"></div>
    <button class="fold" onclick="toggleAcc('kpi-detail-body','kpi-detail-arr')" style="margin-top:6px"><span id="kpi-detail-arr">▶ 詳細を見る</span></button>
    <div id="kpi-detail-body" style="display:none;margin-top:8px">
      <div id="kpi-display"></div>
      <div class="ct" style="margin-top:12px;margin-bottom:6px">接客指標 詳細</div>
      <div id="act-rates"></div>
    </div>
  </div>

  <!-- 5. Category (collapsible) -->
  <div class="c">
    <button class="acc-hd" onclick="toggleAcc('cat-body','cat-arr')">
      <div style="display:flex;justify-content:space-between;align-items:center;width:100%">
        <span class="ct" style="margin:0">カテゴリ別</span>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="display:flex;gap:4px" onclick="event.stopPropagation()"><button class="bsm bs2 ptab" data-pg="cat" onclick="setPeriod('cat','month')" style="font-size:9px;padding:3px 8px">月</button><button class="bsm bp ptab" data-pg="cat" onclick="setPeriod('cat','week')" style="font-size:9px;padding:3px 8px">週</button></div>
          <span id="cat-arr" class="acc-arr">▼</span>
        </div>
      </div>
    </button>
    <div id="cat-body" style="display:block;margin-top:8px">
      <div id="cat-detail"></div>
    </div>
  </div>

  <!-- 6. vs LY -->
  <div class="c">
    <button class="fold" onclick="toggleEl('ly-detail')">前年比を見る</button>
    <div id="ly-detail" style="display:none"><div id="vs-ly"></div></div>
  </div>

  <!-- Report button -->
  <button class="btn bs2 mt8" onclick="openRpt()">週次レポートを生成</button>
</div>

<!-- ===== INPUT ===== -->
<div id="pg-input" class="pg">
  <div class="tabs">
    <button class="tab on" onclick="siTab(this,'single')">今日の入力</button>
    <button class="tab" onclick="siTab(this,'bulk')">一括入力</button>
  </div>

  <!-- Single -->
  <div id="input-single">
    <div class="c">
      <div class="fr"><div class="fg" style="flex:2"><label class="fl">日付</label><input type="date" class="fi" id="i-date"></div><div class="fg" style="flex:1"><label class="fl">スタッフ</label><select class="fi" id="i-staff" style="font-size:14px"></select></div></div>
      <div class="fg"><label class="fl">売上 <span class="hint">(千円)</span></label><input type="number" class="fi" id="i-sales" placeholder="150 = 15万円" inputmode="numeric"></div>
      <div class="ts ttl mb8" id="i-bdg-info"></div>
      <div class="fr"><div class="fg"><label class="fl">Traffic</label><input type="number" class="fi" id="i-traf" inputmode="numeric"></div><div class="fg"><label class="fl">Trans</label><input type="number" class="fi" id="i-trans" inputmode="numeric"></div><div class="fg"><label class="fl">UPT</label><input type="number" class="fi" id="i-upt" inputmode="decimal" step="0.1"></div></div>
      <div class="ts ttl" id="i-calc"></div>
    </div>
    <div class="c">
      <div class="ct">接客数値</div>
      <div class="fr"><div class="fg"><label class="fl">AP</label><input type="number" class="fi" id="i-ap" inputmode="numeric"></div><div class="fg"><label class="fl">SC</label><input type="number" class="fi" id="i-sc" inputmode="numeric"></div><div class="fg"><label class="fl">1-2D</label><input type="number" class="fi" id="i-d12" inputmode="numeric"></div></div>
      <div class="fr"><div class="fg"><label class="fl">3D</label><input type="number" class="fi" id="i-d3" inputmode="numeric"></div><div class="fg"><label class="fl">FC</label><input type="number" class="fi" id="i-fc" inputmode="numeric"></div><div class="fg"><label class="fl">BS</label><input type="number" class="fi" id="i-bs" inputmode="numeric"></div></div>
    </div>
    <div class="c">
      <div class="ct">カテゴリ <span class="hint">(千円)</span></div>
      <div id="cat-in"></div>
    </div>
    <button class="fold" onclick="toggleEl('note-area')">+ メモ（任意）</button>
    <div id="note-area" style="display:none"><div class="c"><div class="fg" style="margin:0"><textarea class="fi" id="i-note" placeholder="気づき、天候、イベントなど"></textarea></div></div></div>
    <button class="btn bp mt8" onclick="saveRec()">登録</button>
  </div>

  <!-- Bulk -->
  <div id="input-bulk" style="display:none">
    <div class="tabs">
      <button class="tab on" onclick="bkTab(this,'ty')">TY日別</button>
      <button class="tab" onclick="bkTab(this,'tywe')">TY週別</button>
      <button class="tab" onclick="bkTab(this,'tymo')">TY月別</button>
      <button class="tab" onclick="bkTab(this,'lymo')">LY月別</button>
      <button class="tab" onclick="bkTab(this,'lyd')">LY日別</button>
    </div>
    <!-- TY Daily -->
    <div id="bk-ty">
      <div class="c"><div class="fr"><div class="fg"><label class="fl">開始日</label><input type="date" class="fi" id="bk-start" onchange="rBulkTY()"></div><div class="fg"><label class="fl">日数</label><select class="fi" id="bk-days" onchange="rBulkTY()"><option value="7">7日</option><option value="14">14日</option><option value="31" selected>1ヶ月</option></select></div></div></div>
      <div class="c" style="overflow-x:auto;padding:8px"><div id="bk-ty-grid"></div></div>
      <button class="btn bp mt8" onclick="saveBulkTY()">登録</button>
    </div>
    <!-- TY Weekly -->
    <div id="bk-tywe" style="display:none">
      <div class="c">
        <div class="ts ttl mb8">週別合計を入力 <span class="hint">（日別より優先・月別より低優先）</span></div>
        <div class="fg"><label class="fl">週</label><select class="fi" id="tywe-week" onchange="rTYWeRow()" style="font-size:12px"></select></div>
      </div>
      <div class="c" id="tywe-form" style="padding:8px"></div>
      <button class="btn bp mt8" onclick="saveTYWe()">登録</button>
    </div>
    <!-- TY Monthly -->
    <div id="bk-tymo" style="display:none">
      <div class="c">
        <div class="ts ttl mb8">今年の月別合計を入力（過去月の結果をまとめて）</div>
        <div class="fg"><label class="fl">年度</label><select class="fi" id="tymo-year" onchange="rTYMo()" style="font-size:14px"></select></div>
      </div>
      <div class="c" style="overflow-x:auto;padding:8px"><div id="tymo-grid"></div></div>
      <button class="btn bp mt8" onclick="saveTYMo()">登録</button>
    </div>
    <!-- LY Monthly -->
    <div id="bk-lymo" style="display:none">
      <div class="c">
        <div class="ts ttl mb8">前年の月別合計を入力（1年分まとめて）</div>
        <div class="fg"><label class="fl">年度</label><select class="fi" id="lymo-year" onchange="rLYMo()" style="font-size:14px"></select></div>
      </div>
      <div class="c" style="overflow-x:auto;padding:8px"><div id="lymo-grid"></div></div>
      <button class="btn bp mt8" onclick="saveLYMo()">登録</button>
    </div>
    <!-- LY Daily (simple) -->
    <div id="bk-lyd" style="display:none">
      <div class="c"><div class="fr"><div class="fg"><label class="fl">開始日</label><input type="date" class="fi" id="lyd-start" onchange="rLYD()"></div><div class="fg"><label class="fl">日数</label><select class="fi" id="lyd-days" onchange="rLYD()"><option value="31" selected>1ヶ月</option><option value="7">7日</option></select></div></div>
        <div class="ts ttl">売上・客数・Traffic・UPTのみ</div>
      </div>
      <div class="c" style="overflow-x:auto;padding:8px"><div id="lyd-grid"></div></div>
      <button class="btn bp mt8" onclick="saveLYD()">登録</button>
    </div>
  </div>
</div>

<!-- ===== PROMO ===== -->
<div id="pg-promo" class="pg">
  <div class="c">
    <div class="ct" id="pm-form-title">新規プロモーション</div>
    <div class="fg"><label class="fl">プロモ名</label><input type="text" class="fi" id="pm-name" placeholder="例：春スキンケア強化"></div>
    <div class="fr"><div class="fg"><label class="fl">開始</label><input type="date" class="fi" id="pm-start"></div><div class="fg"><label class="fl">終了</label><input type="date" class="fi" id="pm-end"></div></div>
    <div class="ct mt8">アクション → 対象KPI</div>
    <div class="ts ttl mb8">各アクションがどのKPIを上げたいか設定</div>
    <div id="pm-acts"></div>
    <button class="btn bs2 bsm mt8" onclick="addPmAct()">+ 追加</button>
    <div class="ct mt12">カテゴリ別注力</div>
    <div class="ts ttl mb8">カテゴリごとの方針（任意）</div>
    <div id="pm-cats"></div>
    <div class="ct mt12">強化商品</div>
    <div class="fg"><input type="text" class="fi" id="pm-products" placeholder="例：ボディスクラブ、クレンジング（カンマ区切り）" style="font-size:13px"></div>
    <button class="btn bp mt8" id="pm-save-btn" onclick="savePm()">登録</button>
  </div>
  <div class="c"><div class="ct">プロモ一覧</div><div id="pm-list"></div></div>
</div>

<!-- ===== SETTINGS ===== -->
<div id="pg-set" class="pg">
  <!-- Budget -->
  <div class="c">
    <div class="ct">日別予算 <span class="hint">(千円)</span></div>
    <div class="fg"><label class="fl">月</label><input type="month" class="fi" id="s-bdg-mo" onchange="rBdg()"></div>
    <div id="bdg-grid" style="max-height:260px;overflow-y:auto"></div>

<script>
const SK='cosme_v7';
const DOW=['日','月','火','水','木','金','土'];
const KPI_NAMES=['AP率','SC率','3デモ率','FC紹介率','CVR','ATV','UPT'];
const PG=['home','input','promo','set'];

function ld(){const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);if(!d.tyMonthly)d.tyMonthly={};if(!d.monthlyBudgets)d.monthlyBudgets={};if(!d.tyWeekly)d.tyWeekly={};return d}return genEmptyData()}
function genEmptyData(){return{records:[],lyRecords:[],lyMonthly:{},tyMonthly:{},tyWeekly:{},budgetTrans:{},targets:{cvr:55,atv:4500,upt:2.5},funnel:{ap:85,sc:30,d3:35,fc:20},catTargets:{},budgets:{},monthlyBudgets:{},categories:[],products:[],staff:[],promos:[]}}
function sv(d){localStorage.setItem(SK,JSON.stringify(d))}
let D=ld(),cM=new Date(),cFocusDate=new Date();

// Nav
function go(p){document.querySelectorAll('.pg').forEach(e=>e.classList.remove('on'));document.querySelectorAll('.ni').forEach(e=>e.classList.remove('on'));document.getElementById('pg-'+p).classList.add('on');document.querySelectorAll('.ni')[PG.indexOf(p)].classList.add('on');({home:rHome,input:iInit,promo:rPm,set:rSet})[p]()}

// Util
function f$k(n){if(n==null||isNaN(n))return'-';const s=n<0?'-':'';return s+Math.round(Math.abs(n)).toLocaleString()+'千円'}
function f$(n){return n==null||isNaN(n)?'-':'¥'+Math.round(n).toLocaleString()}
function fN(n){return n==null||isNaN(n)?'-':Math.round(n).toLocaleString()}
function fP(n){return n==null||isNaN(n)?'-':(Math.round(n*10)/10)+'%'}
function fD(n){return n==null||isNaN(n)?'-':(Math.round(n*10)/10).toFixed(1)}
function mK(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function mL(d){return d.getFullYear()+'年'+(d.getMonth()+1)+'月'}
function gR(d){const k=mK(d);return D.records.filter(r=>r.date.substring(0,7)===k)}
function gLY(d){const k=mK(d);return(D.lyRecords||[]).filter(r=>r.date.substring(0,7)===k)}
function sm(rs,f){return rs.reduce((s,r)=>s+(r[f]||0),0)}
function dim(d){return new Date(d.getFullYear(),d.getMonth()+1,0).getDate()}
function td(){const d=new Date();return[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-')}
function yest(){const d=new Date();d.setDate(d.getDate()-1);return fmtDate(d)}
function effWeek(ws){if(D.tyWeekly&&D.tyWeekly[ws]){const v=D.tyWeekly[ws];return{sales:v.sales||0,trans:v.trans||0,traffic:v.traffic||0}}const wr=weekRecs(ws);return{sales:sm(wr,'sales'),trans:sm(wr,'trans'),traffic:sm(wr,'traffic')}}
function CVR(tr,tn){return tr>0?(tn/tr)*100:0}
function ATV(s,tn){return tn>0?(s*1000)/tn:0}
function avgUpt(rs){const u=rs.filter(r=>r.upt>0);return u.length?u.reduce((s,r)=>s+r.upt,0)/u.length:0}
function rate(v,t){if(!t)return'';return v/t>=1?'◎':v/t>=.9?'○':v/t>=.7?'△':'×'}
function fmtDate(d){return[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-')}
function toggleEl(id){const e=document.getElementById(id);e.style.display=e.style.display==='none'?'block':'none'}
function toggleAcc(bodyId,arrId){const b=document.getElementById(bodyId);const open=b.style.display==='none';b.style.display=open?'block':'none';const a=arrId?document.getElementById(arrId):null;if(a){if(open){a.textContent=a.textContent.includes('詳細')?'▼ 詳細を閉じる':'▼'}else{a.textContent=a.textContent.includes('詳細')?'▶ 詳細を見る':'▶'}}}
// Week Sun-Sat
function weekRange(ds){const d=ds?new Date(ds):new Date();const sun=new Date(d);sun.setDate(d.getDate()-d.getDay());const sat=new Date(sun);sat.setDate(sun.getDate()+6);const f=x=>[x.getFullYear(),String(x.getMonth()+1).padStart(2,'0'),String(x.getDate()).padStart(2,'0')].join('-');return{s:f(sun),e:f(sat)}}
function weekRecs(ds){const{s,e}=weekRange(ds);return D.records.filter(r=>r.date>=s&&r.date<=e)}
function prevWeekRecs(ds){const{s}=weekRange(ds);const d=new Date(s);d.setDate(d.getDate()-7);return weekRecs([d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-'))}
function curPromo(){const t=td();return D.promos.find(p=>p.start<=t&&p.end>=t)}
function kpi(rs){const s=sm(rs,'sales'),tr=sm(rs,'traffic'),tn=sm(rs,'trans'),ap=sm(rs,'ap'),sc=sm(rs,'sc'),d12=sm(rs,'demo12'),d3=sm(rs,'demo3'),dm=d12+d3,fc=sm(rs,'fc');return{sales:s,traffic:tr,trans:tn,cvr:CVR(tr,tn),atv:ATV(s,tn),upt:avgUpt(rs),apR:tr>0?(ap/tr)*100:0,scR:ap>0?(sc/ap)*100:0,d3R:dm>0?(d3/dm)*100:0,fcR:tn>0?(fc/tn)*100:0,ap,sc,d12,d3,fc,bs:sm(rs,'bs')}}
function kpiFromMonthly(v){const s=v.sales||0,tr=v.traffic||0,tn=v.trans||0,ap=v.ap||0,sc=v.sc||0,d12=v.demo12||0,d3=v.demo3||0,dm=d12+d3,fc=v.fc||0;return{sales:s,traffic:tr,trans:tn,cvr:CVR(tr,tn),atv:ATV(s,tn),upt:v.upt||0,apR:tr>0?(ap/tr)*100:0,scR:ap>0?(sc/ap)*100:0,d3R:dm>0?(d3/dm)*100:0,fcR:tn>0?(fc/tn)*100:0,ap,sc,d12,d3,fc,bs:v.bs||0}}
// 月の実績KPIを取得（優先順位: tyMonthly > tyWeekly+日別）
function getMonthKPI(d){
  const mk=mK(d);
  if(D.tyMonthly&&D.tyMonthly[mk])return kpiFromMonthly(D.tyMonthly[mk]);
  // tyWeeklyがある週は週合計、ない週は日別レコードで合計
  const rs=gR(d);
  const weeklySet=new Set(D.tyWeekly?Object.keys(D.tyWeekly):[]);
  const dayRecs=rs.filter(r=>{const ws=weekRange(r.date).s;return!weeklySet.has(ws)});
  let s=sm(dayRecs,'sales'),tr=sm(dayRecs,'traffic'),tn=sm(dayRecs,'trans');
  if(D.tyWeekly)Object.entries(D.tyWeekly).forEach(([ws,v])=>{if(ws.substring(0,7)===mk){s+=v.sales||0;tr+=v.traffic||0;tn+=v.trans||0}});
  if(!s&&!tn)return kpi(rs); // fallback to daily if no tyWeekly either
  const combined={sales:s,traffic:tr,trans:tn,cvr:CVR(tr,tn),atv:ATV(s,tn),upt:avgUpt(dayRecs)};
  return{...combined,apR:0,scR:0,d3R:0,fcR:0,ap:0,sc:0,d12:0,d3:0,fc:0,bs:0}
}
function kpiVal(k,name){return{'AP率':k.apR,'SC率':k.scR,'3デモ率':k.d3R,'FC紹介率':k.fcR,'CVR':k.cvr,'ATV':k.atv,'UPT':k.upt}[name]||0}
function kpiFmt(name){return{'AP率':fP,'SC率':fP,'3デモ率':fP,'FC紹介率':fP,'CVR':fP,'ATV':f$,'UPT':fD}[name]||fP}
function kpiTgt(name){return{'AP率':D.funnel.ap,'SC率':D.funnel.sc,'3デモ率':D.funnel.d3,'FC紹介率':D.funnel.fc,'CVR':D.targets.cvr,'ATV':D.targets.atv,'UPT':D.targets.upt}[name]||0}

// ===== HOME =====
function rFocus(k,pm,ds){
  const el=document.getElementById('focus-content');
  if(!ds)ds=td();
  const todayBdg=D.budgets&&D.budgets[ds]||0;
  const todayRec=D.records.find(r=>r.date===ds);const todaySales=todayRec?todayRec.sales:null;
  const isToday=ds===td();
  let topHtml='';
  const dayLbl=isToday?'今日':ds.substring(5).replace('-','/');
  if(todayBdg){
    if(todaySales!==null){const diff=todaySales-todayBdg;const c=diff>=0?'var(--ok)':'var(--ng)';
      topHtml=`<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:8px"><div><div class="ts ttl">${dayLbl}の売上</div><div class="focus-num" style="color:${c}">${f$k(todaySales)}</div></div><div style="color:${c};font-size:14px;font-weight:800">${diff>=0?'+':''}${f$k(diff)}</div><div class="ts ttl">予算 ${f$k(todayBdg)}</div></div>`
    }else{
      topHtml=`<div style="margin-bottom:8px"><div class="ts ttl">${dayLbl}の予算</div><div class="focus-num">${f$k(todayBdg)}</div><div class="ts" style="color:var(--ng);font-size:10px">${isToday?'本日未入力':'入力なし'}</div></div>`
    }
  }
  // Find worst KPI gaps
  const t=D.targets,fn=D.funnel;
  const ACTION_MAP={'AP率':'入口でのお声がけを量を増やす','SC率':'APのお客様にSCを実施する','3デモ率':'洗う→磨く→潤す の3ステップ体験を増やす','FC紹介率':'FC紹介の声掛けを意識する','CVR':'クロージングのタイミングと提案を見直す','ATV':'セット提案・もう1品のご案内を強化','UPT':'もう1品のご案内を強化'};
  const gaps=[
    {name:'AP率',val:k.apR,tgt:fn.ap,fmt:fP},
    {name:'SC率',val:k.scR,tgt:fn.sc,fmt:fP},
    {name:'3デモ率',val:k.d3R,tgt:fn.d3,fmt:fP},
    {name:'FC紹介率',val:k.fcR,tgt:fn.fc,fmt:fP},
    {name:'CVR',val:k.cvr,tgt:t.cvr,fmt:fP},
    {name:'ATV',val:k.atv,tgt:t.atv,fmt:f$},
    {name:'UPT',val:k.upt,tgt:t.upt,fmt:fD},
  ].filter(g=>g.tgt&&g.val<g.tgt&&g.val>0).sort((a,b)=>((b.tgt-b.val)/b.tgt)-((a.tgt-a.val)/a.tgt));
  let actionHtml='';
  if(!k.traffic){actionHtml='<div class="ts ttl">データ入力後に表示</div>'}
  else if(!gaps.length){actionHtml=`<div class="focus-action" style="background:#e8f5e9"><div class="focus-action-lbl">TODAY\'S STATUS</div><div class="focus-action-txt" style="color:var(--ok)">全KPI目標ペース内 ✓</div></div>`}
  else{
    const g0=gaps[0];actionHtml=`<div class="focus-action"><div class="focus-action-lbl">最優先アクション</div><div class="focus-action-txt">${ACTION_MAP[g0.name]||g0.name+'を改善'}</div><div style="margin-top:4px;font-size:10px;color:var(--tl)">${g0.name}: ${g0.fmt(g0.val)} → 目標 ${g0.fmt(g0.tgt)}</div></div>`;
    if(gaps.length>=2){const g1=gaps[1];actionHtml+=`<div class="focus-2nd"><span style="color:var(--tl)">次点:</span> ${ACTION_MAP[g1.name]||g1.name} <span style="color:var(--tl)">(${g1.name} ${g1.fmt(g1.val)})</span></div>`}
  }
  el.innerHTML=topHtml+actionHtml
}

function rFunnelFlow(k){
  const fn=D.funnel,t=D.targets;
  function clr(v,tgt){if(!tgt||!v)return'var(--tl)';const r=v/tgt;return r>=1?'var(--ok)':r>=0.9?'var(--t)':r>=0.7?'var(--warn)':'var(--ng)'}
  function mrk(v,tgt){if(!tgt||!v)return'';const r=v/tgt;return r>=1?'<span style="color:var(--ok)">◎</span>':r>=0.9?'<span style="color:var(--ok)">○</span>':r>=0.7?'<span style="color:var(--warn)">△</span>':'<span style="color:var(--ng)">×</span>'}
  const steps=[
    {l:'AP率',v:k.apR,tgt:fn.ap,fmt:fP},{l:'SC率',v:k.scR,tgt:fn.sc,fmt:fP},
    {l:'3デモ',v:k.d3R,tgt:fn.d3,fmt:fP},{l:'FC',v:k.fcR,tgt:fn.fc,fmt:fP},
    {l:'CVR',v:k.cvr,tgt:t.cvr,fmt:fP},{l:'ATV',v:k.atv,tgt:t.atv,fmt:n=>'¥'+(Math.round(n/100)/10).toFixed(1)+'k'},
    {l:'UPT',v:k.upt,tgt:t.upt,fmt:fD}
  ];
  document.getElementById('funnel-flow').innerHTML='<div class="funnel">'+steps.map((s,i)=>`<div class="fn-step"><div class="fn-lbl">${s.l}</div><div class="fn-val" style="color:${clr(s.v,s.tgt)}">${s.v>0?s.fmt(s.v):'-'}</div><div class="fn-mrk">${mrk(s.v,s.tgt)}</div></div>${i<steps.length-1?'<div class="fn-arrow">›</div>':''}`).join('')+'</div>'
}

function chMo(d){cM=new Date(cM.getFullYear(),cM.getMonth()+d,1);rHome()}
function chFocus(d){
  if(d===0){cFocusDate=new Date()}
  else{cFocusDate=new Date(cFocusDate);cFocusDate.setDate(cFocusDate.getDate()+d)}
  const ds=fmtDate(cFocusDate);const isToday=ds===td();
  const dow=['日','月','火','水','木','金','土'][cFocusDate.getDay()];
  document.getElementById('focus-date-lbl').textContent=isToday?'今日':`${cFocusDate.getMonth()+1}/${cFocusDate.getDate()}(${dow})`;
  document.getElementById('focus-title').textContent=isToday?'今日のフォーカス':`${cFocusDate.getMonth()+1}/${cFocusDate.getDate()}(${dow}) フォーカス`;
  const focusWK=kpi(weekRecs(ds));
  rFocus(focusWK,curPromo(),ds);
}
function rHome(){
  document.getElementById('d-mo').textContent=mL(cM);
  const rs=gR(cM),mk=mK(cM);
  const k=getMonthKPI(cM);  // tyMonthly優先
  const pm=curPromo();

  // Focus card (week KPI = 直近トレンド)
  window._monthKPI=k;window._weekKPI=kpi(weekRecs());window._prevWeekKPI=kpi(prevWeekRecs());window._mk=mk;
  // フォーカス日付ラベル初期化
  const focusDs=fmtDate(cFocusDate);const isFocusToday=focusDs===td();
  const focusDow=['日','月','火','水','木','金','土'][cFocusDate.getDay()];
  document.getElementById('focus-date-lbl').textContent=isFocusToday?'今日':`${cFocusDate.getMonth()+1}/${cFocusDate.getDate()}(${focusDow})`;
  document.getElementById('focus-title').textContent=isFocusToday?'今日のフォーカス':`${cFocusDate.getMonth()+1}/${cFocusDate.getDate()}(${focusDow}) フォーカス`;
  rFocus(isFocusToday?window._weekKPI:kpi(weekRecs(focusDs)),pm,focusDs);
  // Action Effect
  rActionFx(pm,rs,'week');
  // Budget
  rBudgetTrk(rs,mk,k);
  // Store KPIs for period switching
  setPeriod('bdg','week');setPeriod('kpi','week');setPeriod('cat','month');
  // vs LY
  // LY: check lyMonthly first, then lyRecords, then records from last year
  const lyMK=mK(new Date(cM.getFullYear()-1,cM.getMonth(),1));
  const lyMo=D.lyMonthly&&D.lyMonthly[lyMK];
  const lyRs=gLY(new Date(cM.getFullYear()-1,cM.getMonth(),1));
  const lyEl=document.getElementById('vs-ly');
  if(!lyMo&&!lyRs.length)lyEl.innerHTML='<div class="ts ttl">前年データなし → 入力タブ「一括入力」→「LY月別」で登録</div>';
  else{
    const lyK=lyRs.length?kpi(lyRs):{sales:lyMo?.sales||0,traffic:lyMo?.traffic||0,trans:lyMo?.trans||0,cvr:CVR(lyMo?.traffic||0,lyMo?.trans||0),atv:ATV(lyMo?.sales||0,lyMo?.trans||0)};
    const items=[{l:'売上',c:k.sales,p:lyK.sales,f:f$k},{l:'CVR',c:k.cvr,p:lyK.cvr,f:fP},{l:'ATV',c:k.atv,p:lyK.atv,f:f$},{l:'Traffic',c:k.traffic,p:lyK.traffic,f:fN}];

    lyEl.innerHTML=items.map(i=>{const d=i.p>0?((i.c-i.p)/i.p)*100:0;return`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span>${i.l}</span><span style="font-weight:700">${i.f(i.c)}</span><span class="ts ttl">LY ${i.f(i.p)}</span><span class="tg ${d>=0?'tg-up':'tg-dn'}">${d>=0?'+':''}${fP(d)}</span></div>`}).join('')+lyNote}
  // Activity rendered by setPeriod
}

function rBudgetPeriod(period){
  const el=document.getElementById('budget-trk');
  const mk=window._mk||mK(cM);
  if(period==='year'){
    const year=cM.getFullYear();const now=new Date();
    // cMが過去月なら月末まで、当月/未来なら昨日まで
    const isPastMo=year<now.getFullYear()||(year===now.getFullYear()&&cM.getMonth()<now.getMonth());
    const cutoff=isPastMo?`${year}-${String(cM.getMonth()+1).padStart(2,'0')}-${String(new Date(year,cM.getMonth()+1,0).getDate()).padStart(2,'0')}`:yest();
    const cutoffMo=cutoff.substring(0,7);
    // 月実績を取得するヘルパー（tyMonthly優先 > tyWeekly > 日別）
    function moActual(mk2){
      if(D.tyMonthly&&D.tyMonthly[mk2])return D.tyMonthly[mk2].sales||0;
      const[y2,m2]=mk2.split('-').map(Number);const moEnd=`${y2}-${String(m2).padStart(2,'0')}-${String(new Date(y2,m2,0).getDate()).padStart(2,'0')}`;
      let s=0;
      D.records.filter(r=>r.date.substring(0,7)===mk2&&r.date<=cutoff).forEach(r=>{const ws=weekRange(r.date).s;if(!D.tyWeekly||!D.tyWeekly[ws])s+=r.sales||0});
      if(D.tyWeekly)Object.entries(D.tyWeekly).forEach(([ws,v])=>{if(ws.substring(0,7)===mk2){const{e:we}=weekRange(ws);if(we<=moEnd)s+=v.sales||0}});
      return s;
    }
    let ytdSales=0,ytdBdg=0;
    for(let m=1;m<=12;m++){const mk2=`${year}-${String(m).padStart(2,'0')}`;if(mk2>cutoffMo)break;ytdSales+=moActual(mk2)}
    // 予算（月別優先）
    const hasMBdg=D.monthlyBudgets&&Object.keys(D.monthlyBudgets).some(k=>k.substring(0,4)===String(year));
    if(hasMBdg){for(let m=1;m<=12;m++){const mk2=`${year}-${String(m).padStart(2,'0')}`;if(mk2>cutoffMo)break;const mb=D.monthlyBudgets[mk2]||0;if(!mb)continue;if(mk2<cutoffMo)ytdBdg+=mb;else ytdBdg+=Math.round(mb*parseInt(cutoff.substring(8,10))/new Date(year,m,0).getDate())}}
    else{if(D.budgets)Object.entries(D.budgets).forEach(([d,v])=>{if(d.substring(0,4)===String(year)&&d<=cutoff)ytdBdg+=v})}
    // LY（月別優先・日別と二重カウントしない）
    const lyYear=year-1;let lyYTD=0;
    for(let m=1;m<=12;m++){const lyMk2=`${lyYear}-${String(m).padStart(2,'0')}`;if(lyMk2>`${lyYear}-${cutoffMo.substring(5,7)}`)break;if(D.lyMonthly&&D.lyMonthly[lyMk2])lyYTD+=D.lyMonthly[lyMk2].sales||0;else if(D.lyRecords)lyYTD+=D.lyRecords.filter(r=>r.date.substring(0,7)===lyMk2).reduce((s,r)=>s+(r.sales||0),0)}
    const diff=ytdSales-ytdBdg;
    const lyDiffK=lyYTD>0?ytdSales-lyYTD:null;const lyDiffPct=lyYTD>0?Math.round((ytdSales-lyYTD)/lyYTD*1000)/10:null;
    const cutLabel=isPastMo?`1〜${cM.getMonth()+1}月`:`〜昨日`;
    // 月別テーブル
    const lyYear2=year-1;
    let tbl=`<table class="dt" style="margin-top:10px;font-size:11px"><thead><tr><th>月</th><th class="n">実績</th><th class="n">予算</th><th class="n">差異</th><th class="n">LY比</th></tr></thead><tbody>`;
    for(let m=1;m<=12;m++){
      const mk2=`${year}-${String(m).padStart(2,'0')}`;if(mk2>cutoffMo)break;
      const mA=moActual(mk2);const mB=D.monthlyBudgets?.[mk2]||0;
      const isCurrMo=mk2===mK(new Date());
      const lyMK2=`${lyYear2}-${String(m).padStart(2,'0')}`;
      let lyA=D.lyMonthly?.[lyMK2]?.sales||0;
      if(!lyA)lyA=D.lyRecords?D.lyRecords.filter(r=>r.date.substring(0,7)===lyMK2).reduce((s,r)=>s+(r.sales||0),0):0;
      const mD=mB?mA-mB:null;const lyD=lyA?mA-lyA:null;const lyP=lyA?Math.round((mA-lyA)/lyA*1000)/10:null;
      const moLabel=`${m}月${isCurrMo?'<span class="ts" style="color:var(--p)">今月</span>':''}`;
      tbl+=`<tr><td style="white-space:nowrap">${moLabel}</td><td class="n">${mA?f$k(mA)+(isCurrMo?'<span class="ts">〜昨日</span>':''):'-'}</td><td class="n">${mB?f$k(mB):'-'}</td><td class="n ${mD!==null?mD>=0?'pos':'neg':''}">${mD!==null?(mD>=0?'+':'')+f$k(mD):'-'}</td><td class="n ${lyD!==null?lyD>=0?'pos':'neg':''}">${lyD!==null?(lyD>=0?'+':'')+f$k(lyD)+'<br><span class="ts">'+(lyP>=0?'+':'')+fP(lyP)+'</span>':'-'}</td></tr>`;
    }
    tbl+=`<tr style="font-weight:700"><td>累計</td><td class="n">${f$k(ytdSales)}</td><td class="n">${ytdBdg?f$k(ytdBdg):'-'}</td><td class="n ${diff>=0?'pos':'neg'}">${ytdBdg?(diff>=0?'+':'')+f$k(diff):'-'}</td><td class="n ${lyDiffK!==null?lyDiffK>=0?'pos':'neg':''}">${lyDiffK!==null?(lyDiffK>=0?'+':'')+f$k(lyDiffK)+'<br><span class="ts">'+(lyDiffPct>=0?'+':'')+fP(lyDiffPct)+'</span>':'-'}</td></tr>`;
    tbl+=`</tbody></table>`;
    el.innerHTML=`<div style="display:flex;gap:16px;flex-wrap:wrap">
      <div><div class="ts ttl">${year}年 予算差（${cutLabel}）</div><div style="font-size:15px;font-weight:800;color:${diff>=0?'var(--ok)':'var(--ng)'}">${diff>=0?'+':''}${f$k(diff)}</div><div class="ts ttl">${f$k(ytdSales)} / 予算${f$k(ytdBdg)}</div></div>
      ${lyYTD?`<div><div class="ts ttl">前年比（${cutLabel}）</div><div style="font-size:15px;font-weight:800;color:${lyDiffK>=0?'var(--ok)':'var(--ng)'}">${lyDiffK>=0?'+':''}${f$k(lyDiffK)} (${lyDiffPct>=0?'+':''}${fP(lyDiffPct)})</div><div class="ts ttl">${f$k(ytdSales)} / LY${f$k(lyYTD)}</div></div>`:''}
    </div>${tbl}`;
  }else if(period==='week'||period==='prevweek'){
    const isPrev=period==='prevweek';
    // 対象週の日曜日を取得
    const baseDs=isPrev?fmtDate(new Date(new Date(weekRange().s).getTime()-7*86400000)):null;
    const{s,e}=isPrev?weekRange(baseDs):weekRange();
    const yesterday=yest();
    // 前週は土曜まで全部確定済みなので cutoff=土曜、今週は昨日
    // 日曜の場合: yesterday=先週土曜 < s=今日(日) → cutoff=s(日曜)を使う
    const cutoff=isPrev?e:(yesterday>=s?yesterday:s);
    const tdLabel=isPrev?'週計':(yesterday>=s?'〜昨日':'今日');
    let wBdgAll=0,wBdgToDate=0,wBdgAllT=0,wBdgToDateT=0;
    let wd=new Date(s);while(fmtDate(wd)<=e){const ds=fmtDate(wd);const b=D.budgets&&D.budgets[ds]||0,bt=D.budgetTrans&&D.budgetTrans[ds]||0;wBdgAll+=b;wBdgAllT+=bt;if(ds<=cutoff){wBdgToDate+=b;wBdgToDateT+=bt}wd.setDate(wd.getDate()+1)}
    const wEff=effWeek(s);const wS=wEff.sales,wT=wEff.trans;
    const isWeekly=!!(D.tyWeekly&&D.tyWeekly[s]);
    const diffAll=wS-wBdgAll,diffTD=wS-wBdgToDate;
    // dLeft: 今日含む残り日数（今日〜土曜）
    const dLeft=isPrev?0:Math.max(0,Math.round((new Date(e)-new Date(td()))/86400000)+1);
    // LY same week (364 days ago)
    const lyWStart=new Date(new Date(s).getTime()-364*86400000);
    const{s:lys,e:lye}=weekRange(fmtDate(lyWStart));
    let lyWSales=0,lyWTrans=0;
    if(D.lyRecords&&D.lyRecords.length)D.lyRecords.filter(r=>r.date>=lys&&r.date<=lye).forEach(r=>{lyWSales+=r.sales||0;lyWTrans+=r.trans||0});
    const lyDiffK=lyWSales>0?wS-lyWSales:null;const lyDiffPct=lyWSales>0?Math.round((wS-lyWSales)/lyWSales*1000)/10:null;
    const weekLabel=`${s.substring(5).replace('-','/')}(日)〜${e.substring(5).replace('-','/')}(土)`;
    let html=`<div class="ts" style="color:var(--p);font-weight:600;margin-bottom:6px">${isPrev?'前週 ':'今週 '}${weekLabel}</div>`;
    html+=`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px">
      <div><div class="ts ttl">週全体予算差${isWeekly?' <span style="color:var(--p);font-size:9px">週別入力</span>':''}</div><div style="font-size:15px;font-weight:800;color:${diffAll>=0?'var(--ok)':'var(--ng)'}">${diffAll>=0?'+':''}${f$k(diffAll)}</div><div class="ts ttl">${f$k(wS)} / 予算${f$k(wBdgAll)}</div></div>
      <div style="border-left:1px solid #eee;padding-left:12px"><div class="ts ttl">${tdLabel} 予算差</div><div style="font-size:15px;font-weight:800;color:${diffTD>=0?'var(--ok)':'var(--ng)'}">${diffTD>=0?'+':''}${f$k(diffTD)}</div><div class="ts ttl">${f$k(wS)} / ${tdLabel}予算${f$k(wBdgToDate)}</div></div>
      ${lyDiffK!==null?`<div style="border-left:1px solid #eee;padding-left:12px"><div class="ts ttl">前年比</div><div style="font-size:15px;font-weight:800;color:${lyDiffK>=0?'var(--ok)':'var(--ng)'}">${lyDiffK>=0?'+':''}${f$k(lyDiffK)} (${lyDiffPct>=0?'+':''}${fP(lyDiffPct)})</div><div class="ts ttl">${f$k(wS)} / LY${f$k(lyWSales)}</div></div>`:''}
    </div>`;
    const atvTgtW=D.targets?.atv||0;
    if(wBdgToDateT>0||wT>0||atvTgtW>0||lyWTrans>0){
      html+=`<div style="display:flex;gap:12px;flex-wrap:wrap;border-top:1px solid #eee;padding-top:8px;margin-top:4px">`;
      if(wBdgToDateT>0){
        const tD=wT-wBdgToDateT;const tAll=wT-wBdgAllT;
        const tgtPct=wBdgAllT>0?Math.round(wT/wBdgAllT*1000)/10:null;
        const tgtColor=tgtPct>=100?'var(--ok)':tgtPct>=85?'var(--warn)':'var(--ng)';
        html+=`<div><div class="ts ttl">客数差（${tdLabel}）</div><div style="font-size:13px;font-weight:700;color:${tD>=0?'var(--ok)':'var(--ng)'}">${tD>=0?'+':''}${fN(tD)}</div><div class="ts ttl">${fN(wT)} / 予算${fN(wBdgToDateT)}</div>${tgtPct!==null?`<div class="ts" style="color:${tgtColor}">TGT比 ${fP(tgtPct)}</div>`:''} ${!isPrev&&tAll<0&&dLeft>0?`<div class="ts" style="color:var(--ng)">残${dLeft}日 +${Math.ceil(Math.abs(tAll)/dLeft)}/日</div>`:''}</div>`;
      } else if(wT>0)html+=`<div><div class="ts ttl">客数</div><div style="font-size:13px;font-weight:700">${fN(wT)}</div></div>`;
      if(lyWTrans>0&&wT>0){const lyTD=wT-lyWTrans;const lyTP=Math.round((wT-lyWTrans)/lyWTrans*1000)/10;html+=`<div><div class="ts ttl">客数 LY比</div><div style="font-size:13px;font-weight:700;color:${lyTD>=0?'var(--ok)':'var(--ng)'}">${lyTD>=0?'+':''}${fN(lyTD)} (${lyTP>=0?'+':''}${fP(lyTP)})</div><div class="ts ttl">${fN(wT)} / LY${fN(lyWTrans)}</div></div>`}
      if(atvTgtW>0&&wT>0){const wAtv=Math.round(wS*1000/wT);const aD=wAtv-atvTgtW;html+=`<div><div class="ts ttl">ATV</div><div style="font-size:13px;font-weight:700;color:${aD>=0?'var(--ok)':'var(--ng)'}">¥${wAtv.toLocaleString()}</div><div class="ts ttl">目標¥${Math.round(atvTgtW).toLocaleString()} (${aD>=0?'+':''}¥${Math.round(aD).toLocaleString()})</div></div>`}
      html+=`</div>`;
    }
    if(!isPrev&&diffAll<0&&dLeft>0)html+=`<div class="ts mt8" style="color:var(--ng)">残${dLeft}日 +${f$k(Math.ceil(Math.abs(diffAll)/dLeft))}/日で挽回</div>`;
    // 客数 日別累計比（週入力でない場合のみ）
    if(!isPrev&&!isWeekly){
      let cumBdg=0,cumAct=0;const tRows=[];
      let wd2=new Date(s);while(fmtDate(wd2)<=e){
        const ds2=fmtDate(wd2);
        const bdgt=D.budgetTrans&&D.budgetTrans[ds2]||0;
        const rec=D.records.find(r=>r.date===ds2);
        const act=rec?rec.trans||0:null;
        cumBdg+=bdgt;if(act!==null)cumAct+=act;
        const dow2=['日','月','火','水','木','金','土'][wd2.getDay()];
        const isF=ds2>cutoff;// 未来日
        tRows.push({dow2,bdgt,act,cumBdg,cumAct:act!==null?cumAct:null,isF});
        wd2.setDate(wd2.getDate()+1);
      }
      if(tRows.some(r=>r.bdgt>0||r.act!==null)){
        const rowHtml=tRows.map(r=>{
          const diff=r.cumAct!==null&&r.cumBdg>0?r.cumAct-r.cumBdg:null;
          const dc=diff===null?'':diff>=0?'pos':'neg';
          return`<tr style="${r.isF?'color:#bbb':''}"><td style="font-size:9px">${r.dow2}</td><td class="n">${r.bdgt||''}</td><td class="n">${r.act!==null?r.act:''}</td><td class="n">${r.cumBdg||''}</td><td class="n">${r.cumAct!==null?r.cumAct:''}</td><td class="n ${dc}">${diff!==null?(diff>=0?'+':'')+diff:''}</td></tr>`;
        }).join('');
        html+=`<div style="border-top:1px solid #eee;padding-top:8px;margin-top:6px"><div class="ts ttl" style="margin-bottom:4px">客数 日別累計</div><table class="dt" style="font-size:9px"><thead><tr><th></th><th class="n">予算</th><th class="n">実績</th><th class="n">累計予算</th><th class="n">累計実績</th><th class="n">差</th></tr></thead><tbody>${rowHtml}</tbody></table></div>`;
      }
    }
    el.innerHTML=html;
  }else{
    // Month - existing logic
    rBudgetTrk(gR(cM),mk,window._monthKPI||kpi(gR(cM)));
  }
}

  function kpiBox(label,val,tgt,fmt){

function rActRates(k){
  const fn=D.funnel,t=D.targets;
  const items=[
    {l:'AP率',v:k.apR,tgt:fn.ap,cnt:k.ap,fmt:fP},

      <div style="min-width:55px;text-align:right;font-weight:700;font-size:13px;color:${color}">${i.fmt(i.v)}</div>
      <div style="min-width:45px;text-align:right;font-size:9px;color:var(--tl)">${i.tgt?i.fmt(i.tgt)+(i.cnt?' ('+fN(i.cnt)+')':''):i.cnt?fN(i.cnt)+' 件':''}</div>
    </div>`}).join('');
}

function rCatDetail(period){
  const el=document.getElementById('cat-detail');
  let k,ct={};
  if(period==='week'){
    const rs=weekRecs();k=kpi(rs);
    rs.forEach(r=>{if(r.categories)Object.entries(r.categories).forEach(([c,v])=>{ct[c]=(ct[c]||0)+v})});
  }else{
    k=getMonthKPI(cM);  // tyMonthly優先
    const mk=mK(cM);const tmo=D.tyMonthly&&D.tyMonthly[mk];
    if(tmo){D.categories.forEach(c=>{if(tmo['cat-'+c])ct[c]=tmo['cat-'+c]})}
    else{const rs=gR(cM);rs.forEach(r=>{if(r.categories)Object.entries(r.categories).forEach(([c,v])=>{ct[c]=(ct[c]||0)+v})})}
  }
  const totalSales=k.sales;
  // Monthly targets for SOB
  const catTgts=D.catTargets||{};
  // LY data
  const lyMK=mK(new Date(cM.getFullYear()-1,cM.getMonth(),1));
  const lyMo=D.lyMonthly&&D.lyMonthly[lyMK];
  // Week ratio (for week view: divide monthly target by ~4.3)
  const weekRatio=period==='week'?7/dim(cM):1;

  if(!D.categories.length){el.innerHTML='<div class="ts ttl">設定タブでカテゴリーを登録してください</div>';return}
  if(!totalSales&&!Object.keys(ct).length){el.innerHTML='<div class="ts ttl">データなし（TY月別またはTY日別でカテゴリーを入力）</div>';return}

  el.innerHTML='<table class="dt"><thead><tr><th>カテゴリ</th><th class="n">実績</th><th class="n">SOB</th><th class="n">予算</th><th class="n">差</th><th class="n">LY比</th></tr></thead><tbody>'
    +D.categories.map(c=>{
      const actual=ct[c]||0;
      const sob=totalSales>0?((actual/totalSales)*100):0;
      const catBdg=catTgts[c]?Math.round(catTgts[c]*weekRatio):0;
      const diff=catBdg?actual-catBdg:0;
      const lyVal=lyMo&&lyMo['cat-'+c]?Math.round(lyMo['cat-'+c]*weekRatio):0;
      const lyDiff=lyVal>0?((actual-lyVal)/lyVal)*100:0;
      return`<tr><td style="font-size:10px">${c}</td><td class="n">${f$k(actual)}</td><td class="n">${fP(sob)}</td><td class="n">${catBdg?f$k(catBdg):'-'}</td><td class="n ${diff>=0?'pos':'neg'}">${catBdg?(diff>=0?'+':'')+Math.round(diff):'-'}</td><td class="n ${lyDiff>=0?'pos':'neg'}">${lyVal?(lyDiff>=0?'+':'')+fP(lyDiff):'-'}</td></tr>`
    }).join('')+'</tbody></table>';
}

function rActionFx(pm,rs,period){

    return}
  if(!rs.length){el.innerHTML='<div class="ts ttl">データ入力後に表示</div>';return}

  const isPrev=period==='prev';
  const thisW=isPrev?kpi(prevWeekRecs()):kpi(weekRecs());
  const prevW=isPrev?kpi(prevWeekRecs(fmtDate(new Date(new Date(weekRange().s).getTime()-7*86400000)))):kpi(prevWeekRecs());
  const{s:ws,e:we}=isPrev?weekRange(fmtDate(new Date(new Date(weekRange().s).getTime()-7*86400000))):weekRange();
  const weekLabel=isPrev?`前週 (${ws.substring(5).replace('-','/')}〜${we.substring(5).replace('-','/')})`:null;
  el.innerHTML=`<div class="promo-bar" style="margin-bottom:8px"><div class="promo-name">${pm.name}</div><div style="display:flex;gap:8px;align-items:center"><div class="promo-date">${pm.start}〜${pm.end}</div>${weekLabel?`<span class="ts" style="color:var(--p);font-weight:600">${weekLabel}</span>`:''}</div></div>`
    +pm.actionItems.map(item=>{
      const cur=kpiVal(thisW,item.kpi),prev=kpiVal(prevW,item.kpi),fmt=kpiFmt(item.kpi);
      const diff=cur-prev,up=diff>0;
      const tgt=kpiTgt(item.kpi);
      const prevLabel=isPrev?'前々週':'前週';
      return`<div class="ae" style="background:${up?'#e8f5e9':'#fff3e0'};border-left:3px solid ${up?'var(--ok)':'var(--warn)'}">

          <span class="ae-trend" style="color:${up?'var(--ok)':'var(--warn)'}">${fmt(cur)} ${up?'↑':'↓'}</span>
          <span class="ts ttl">${prevLabel}${fmt(prev)}</span>
        </div>
      </div>`}).join('');
}

function rBudgetTrk(rs,mk,k){
  const el=document.getElementById('budget-trk');
  let bdgToDate=0,bdgMonth=0,remDays=0,trnToDate=0;const yesterday=yest();
  const mBdg=D.monthlyBudgets&&D.monthlyBudgets[mk];
  if(mBdg){
    bdgMonth=mBdg;const[y,m]=mk.split('-').map(Number);const dim2=new Date(y,m,0).getDate();
    const dp=mk===yesterday.substring(0,7)?parseInt(yesterday.substring(8,10)):dim2;
    bdgToDate=Math.round(mBdg*dp/dim2);remDays=dim2-dp;
  }else{
    if(D.budgets)Object.entries(D.budgets).forEach(([d,v])=>{if(d.substring(0,7)===mk){bdgMonth+=v;if(d<=yesterday)bdgToDate+=v;if(d>yesterday)remDays++}});
    if(D.budgetTrans)Object.entries(D.budgetTrans).forEach(([d,v])=>{if(d.substring(0,7)===mk&&d<=yesterday)trnToDate+=v});
  }
  if(!bdgMonth){el.innerHTML='<div class="ts ttl">設定タブで予算を登録</div>';return}
  // LY
  const lyMK=mK(new Date(parseInt(mk.substring(0,4))-1,parseInt(mk.substring(5,7))-1,1));
  const lyMo=D.lyMonthly&&D.lyMonthly[lyMK];
  // lyMonthly優先、なければlyRecordsで合計（二重カウントしない）
  const lyS=lyMo?lyMo.sales:(D.lyRecords?D.lyRecords.filter(r=>r.date.substring(0,7)===lyMK).reduce((s,r)=>s+(r.sales||0),0):0);
  const lyDiffK=lyS>0?k.sales-lyS:null;const lyDiffPct=lyS>0?Math.round((k.sales-lyS)/lyS*1000)/10:null;
  const diff=k.sales-bdgToDate;
  const pct=bdgMonth>0?Math.min((k.sales/bdgMonth)*100,100):0;
  let html=`<div class="pb"><div class="pf" style="width:${pct}%;background:${pct>=85?'var(--ok)':pct>=70?'var(--warn)':'var(--ng)'}"></div></div>
    <div class="pl"><span>${f$k(k.sales)}</span><span>月予算 ${f$k(bdgMonth)}</span></div>
    <div style="display:flex;gap:16px;margin-top:8px;flex-wrap:wrap">
      <div><div class="ts ttl">予算差（〜昨日）</div><div style="font-size:15px;font-weight:800;color:${diff>=0?'var(--ok)':'var(--ng)'}">${diff>=0?'+':''}${f$k(diff)}</div><div class="ts ttl">${f$k(k.sales)} / 〜昨日予算${f$k(bdgToDate)}</div></div>
      ${lyS?`<div><div class="ts ttl">前年比</div><div style="font-size:15px;font-weight:800;color:${lyDiffK>=0?'var(--ok)':'var(--ng)'}">${lyDiffK>=0?'+':''}${f$k(lyDiffK)} (${lyDiffPct>=0?'+':''}${fP(lyDiffPct)})</div><div class="ts ttl">${f$k(k.sales)} / LY${f$k(lyS)}</div></div>`:''}
    </div>`;
  if(diff<0&&remDays>0)html+=`<div class="ts" style="color:var(--ng);margin-top:4px">残${remDays}日 +${f$k(Math.ceil(Math.abs(diff)/remDays))}/日 必要</div>`;
  // Trans LY & 月全体予算Trans
  const lyT=lyMo?lyMo.trans:(D.lyRecords?D.lyRecords.filter(r=>r.date.substring(0,7)===lyMK).reduce((s,r)=>s+(r.trans||0),0):0);
  const trnMonth=D.budgetTrans?Object.entries(D.budgetTrans).filter(([d])=>d.substring(0,7)===mk).reduce((s,[,v])=>s+v,0):0;
  // Trans / ATV
  const atvTgt=D.targets?.atv||0;
  if(trnToDate>0||trnMonth>0||k.trans>0||atvTgt>0||lyT>0){
    html+=`<div style="display:flex;gap:12px;flex-wrap:wrap;border-top:1px solid #eee;padding-top:8px;margin-top:8px">`;
    // 客数差（〜昨日）+ TGT比
    if(trnToDate>0||trnMonth>0){
      const tD=k.trans-trnToDate;
      const tgtPct=trnMonth>0?Math.round(k.trans/trnMonth*1000)/10:null;
      const tgtColor=tgtPct>=100?'var(--ok)':tgtPct>=85?'var(--warn)':'var(--ng)';
      html+=`<div><div class="ts ttl">客数差（〜昨日）</div><div style="font-size:13px;font-weight:700;color:${tD>=0?'var(--ok)':'var(--ng)'}">${tD>=0?'+':''}${fN(tD)}</div><div class="ts ttl">${fN(k.trans)} / 予算${fN(trnToDate)}</div>${tgtPct!==null?`<div class="ts" style="color:${tgtColor}">TGT比 ${fP(tgtPct)}</div>`:''} ${tD<0&&remDays>0?`<div class="ts" style="color:var(--ng)">残${remDays}日 +${Math.ceil(Math.abs(tD)/remDays)}/日</div>`:''}</div>`;
    } else if(k.trans>0)html+=`<div><div class="ts ttl">客数</div><div style="font-size:13px;font-weight:700">${fN(k.trans)}</div></div>`;
    // 客数LY比
    if(lyT>0&&k.trans>0){const lyTD=k.trans-lyT;const lyTP=Math.round((k.trans-lyT)/lyT*1000)/10;html+=`<div><div class="ts ttl">客数 LY比</div><div style="font-size:13px;font-weight:700;color:${lyTD>=0?'var(--ok)':'var(--ng)'}">${lyTD>=0?'+':''}${fN(lyTD)} (${lyTP>=0?'+':''}${fP(lyTP)})</div><div class="ts ttl">${fN(k.trans)} / LY${fN(lyT)}</div></div>`}
    // ATV
    if(atvTgt>0&&k.trans>0){const aD=k.atv-atvTgt;html+=`<div><div class="ts ttl">ATV</div><div style="font-size:13px;font-weight:700;color:${aD>=0?'var(--ok)':'var(--ng)'}">¥${Math.round(k.atv).toLocaleString()}</div><div class="ts ttl">目標¥${Math.round(atvTgt).toLocaleString()} (${aD>=0?'+':''}¥${Math.round(aD).toLocaleString()})</div></div>`}
    html+=`</div>`;
  }
  el.innerHTML=html;
}

  const cols=[{l:'売上',f:'sales'},{l:'客数',f:'trans'},{l:'Traf',f:'traffic'},{l:'UPT',f:'upt'},{l:'AP',f:'ap'},{l:'SC',f:'sc'},{l:'1-2D',f:'demo12'},{l:'3D',f:'demo3'},{l:'FC',f:'fc'},{l:'BS',f:'bs'}];
  D.categories.forEach(c=>cols.push({l:c.substring(0,3),f:'cat-'+c}));
  let html='<table class="dt"><thead><tr><th>月</th>'+cols.map(c=>`<th class="n" style="font-size:7px">${c.l}</th>`).join('')+'</tr></thead><tbody>';
  for(let m=1;m<=12;m++){
    const mk=year+'-'+String(m).padStart(2,'0');
    const existing=D.lyMonthly&&D.lyMonthly[mk];
    html+=`<tr><td style="font-size:11px;font-weight:600">${m}月</td>`;
    cols.forEach(c=>{let val=existing&&existing[c.f]||'';
      html+=`<td class="n"><input type="number" data-lymo="${mk}" data-lmcol="${c.f}" value="${val}" inputmode="${c.f==='upt'?'decimal':'numeric'}" class="bk-i"></td>`});
    html+='</tr>'}
  html+='</tbody></table>';document.getElementById('lymo-grid').innerHTML=html}
function saveLYMo(){
  if(!D.lyMonthly)D.lyMonthly={};let c=0;
  const months=new Set();document.querySelectorAll('[data-lymo]').forEach(e=>months.add(e.dataset.lymo));
  months.forEach(mk=>{const g=col=>{const e=document.querySelector(`[data-lymo="${mk}"][data-lmcol="${col}"]`);return e?parseFloat(e.value)||0:0};
    const sales=g('sales');if(!sales)return;
    const obj={sales,trans:g('trans'),traffic:g('traffic'),upt:g('upt'),ap:g('ap'),sc:g('sc'),demo12:g('demo12'),demo3:g('demo3'),fc:g('fc'),bs:g('bs')};
    D.categories.forEach(ct=>{const v=g('cat-'+ct);if(v)obj['cat-'+ct]=v});
    D.lyMonthly[mk]=obj;c++});
  sv(D);alert(c+'ヶ月分登録！')}

// LY Daily (simple)

  if(!start){const ly=new Date();ly.setFullYear(ly.getFullYear()-1);ly.setDate(1);document.getElementById('lyd-start').value=fmtDate(ly)}
  const startD=new Date(document.getElementById('lyd-start').value);
  const days=parseInt(document.getElementById('lyd-days').value)||31;
  let html='<table class="dt"><thead><tr><th>日</th><th class="n" style="font-size:8px">売上</th><th class="n" style="font-size:8px">客数</th><th class="n" style="font-size:8px">Traf</th><th class="n" style="font-size:8px">UPT</th></tr></thead><tbody>';
  for(let i=0;i<days;i++){
    const d=new Date(startD);d.setDate(startD.getDate()+i);
    const ds=fmtDate(d);const dow=DOW[d.getDay()],isWe=d.getDay()===0||d.getDay()===6;
    const src=(D.lyRecords||[]).find(r=>r.date===ds);
    html+=`<tr style="${isWe?'background:#fef7f7':''}"><td style="font-size:9px">${d.getDate()}${dow}</td>
      <td class="n"><input type="number" data-lyd="${ds}" data-ldcol="sales" value="${src?.sales||''}" inputmode="numeric" class="bk-i"></td>
      <td class="n"><input type="number" data-lyd="${ds}" data-ldcol="trans" value="${src?.trans||''}" inputmode="numeric" class="bk-i"></td>
      <td class="n"><input type="number" data-lyd="${ds}" data-ldcol="traffic" value="${src?.traffic||''}" inputmode="numeric" class="bk-i"></td>
      <td class="n"><input type="number" data-lyd="${ds}" data-ldcol="upt" value="${src?.upt||''}" inputmode="decimal" class="bk-i"></td></tr>`}
  html+='</tbody></table>';document.getElementById('lyd-grid').innerHTML=html}
function saveLYD(){
  if(!D.lyRecords)D.lyRecords=[];const dates=new Set();
  document.querySelectorAll('[data-lyd]').forEach(e=>dates.add(e.dataset.lyd));let c=0;
  dates.forEach(ds=>{const g=col=>{const e=document.querySelector(`[data-lyd="${ds}"][data-ldcol="${col}"]`);return e?parseFloat(e.value)||0:0};
    const sales=g('sales');if(!sales)return;
    const rec={date:ds,sales,trans:g('trans'),traffic:g('traffic'),upt:g('upt'),ap:0,sc:0,demo12:0,demo3:0,fc:0,bs:0,staff:'',note:'',categories:{},products:{}};
    const ei=D.lyRecords.findIndex(r=>r.date===ds);if(ei>=0)D.lyRecords[ei]=rec;else D.lyRecords.push(rec);c++});
  D.lyRecords.sort((a,b)=>a.date.localeCompare(b.date));sv(D);alert(c+'日分(LY)登録！')}

// ===== PROMO =====
let pmActN=0,pmEditIdx=-1;
function addPmAct(){const list=document.getElementById('pm-acts'),id=pmActN++;const div=document.createElement('div');div.className='fr mb8';div.id='pa-'+id;
  div.innerHTML=`<div class="fg" style="flex:3;margin:0"><input type="text" class="fi" data-pa-a="${id}" placeholder="アクション内容" style="font-size:13px"></div><div class="fg" style="flex:2;margin:0"><select class="fi" data-pa-k="${id}" style="font-size:13px">${KPI_NAMES.map(k=>`<option>${k}</option>`).join('')}</select></div><button class="del" onclick="document.getElementById('pa-${id}').remove()">×</button>`;
  list.appendChild(div)}
function rPm(){pmActN=0;pmEditIdx=-1;document.getElementById('pm-name').value='';document.getElementById('pm-start').value='';document.getElementById('pm-end').value='';document.getElementById('pm-products').value='';
  document.getElementById('pm-form-title').textContent='新規プロモーション';document.getElementById('pm-save-btn').textContent='登録';
  document.getElementById('pm-acts').innerHTML='';addPmAct();addPmAct();addPmAct();addPmAct();
  document.getElementById('pm-cats').innerHTML=D.categories.map(c=>`<div class="fg"><label class="fl" style="font-size:11px">${c}</label><input type="text" class="fi" data-pmcat="${c}" placeholder="方針（例：セット提案強化）" style="font-size:12px"></div>`).join('');
  const el=document.getElementById('pm-list'),today=td();
  if(!D.promos.length){el.innerHTML='<div class="ts ttl">プロモなし</div>';return}
  el.innerHTML=D.promos.sort((a,b)=>b.start.localeCompare(a.start)).map((p,i)=>{const isA=p.start<=today&&p.end>=today;
    return`<div class="c" style="${isA?'border-left:4px solid var(--p)':''}"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-weight:700;font-size:13px">${p.name}${isA?' <span class="tg tg-up">実施中</span>':''}</div><div class="ts ttl">${p.start}〜${p.end}</div></div><div style="display:flex;gap:6px;flex-shrink:0"><button class="btn bsm bs2" style="font-size:10px;padding:3px 8px" onclick="editPm(${i})">編集</button><button class="del" onclick="delPm(${i})">×</button></div></div>${(p.actionItems||[]).map(a=>`<div class="ts mt8">${a.action} → <strong>${a.kpi}</strong></div>`).join('')}${p.catActions?Object.entries(p.catActions).map(([c,v])=>`<div class="ts" style="color:var(--info)">【${c}】${v}</div>`).join(''):''}${p.focusProducts&&p.focusProducts.length?`<div class="ts mt8" style="color:var(--pd)">強化品: ${p.focusProducts.join('、')}</div>`:''}</div>`}).join('')}
function editPm(i){const p=D.promos[i];pmEditIdx=i;
  document.getElementById('pm-name').value=p.name;document.getElementById('pm-start').value=p.start;document.getElementById('pm-end').value=p.end;
  document.getElementById('pm-products').value=(p.focusProducts||[]).join('、');
  document.getElementById('pm-acts').innerHTML='';pmActN=0;
  (p.actionItems||[]).forEach(item=>{addPmAct();const id=pmActN-1;document.querySelector(`[data-pa-a="${id}"]`).value=item.action;document.querySelector(`[data-pa-k="${id}"]`).value=item.kpi});
  if(!(p.actionItems&&p.actionItems.length))addPmAct();
  document.querySelectorAll('[data-pmcat]').forEach(e=>{e.value=(p.catActions&&p.catActions[e.dataset.pmcat])||''});
  document.getElementById('pm-form-title').textContent='編集：'+p.name;document.getElementById('pm-save-btn').textContent='更新';
  document.getElementById('pm-form-title').scrollIntoView({behavior:'smooth'})}
function savePm(){const name=document.getElementById('pm-name').value.trim(),start=document.getElementById('pm-start').value,end=document.getElementById('pm-end').value;
  if(!name||!start||!end){alert('プロモ名と期間を入力');return}
  const actionItems=[];document.querySelectorAll('[data-pa-a]').forEach(e=>{const id=e.dataset.paA,k=document.querySelector(`[data-pa-k="${id}"]`),a=e.value.trim();if(a&&k)actionItems.push({action:a,kpi:k.value})});
  const catActions={};document.querySelectorAll('[data-pmcat]').forEach(e=>{const v=e.value.trim();if(v)catActions[e.dataset.pmcat]=v});
  const focusProducts=document.getElementById('pm-products').value.split(/[,、]/).map(s=>s.trim()).filter(s=>s);
  const pm={name,start,end,actionItems,catActions,focusProducts};
  if(pmEditIdx>=0){D.promos[pmEditIdx]=pm}else{D.promos.push(pm)}
  sv(D);alert(pmEditIdx>=0?'更新！':'登録！');pmEditIdx=-1;rPm()}
function delPm(i){if(confirm('削除？')){D.promos.splice(i,1);sv(D);rPm()}}

// ===== REPORT =====
function openRpt(){document.getElementById('rpt-modal').style.display='block';const sel=document.getElementById('rpt-period');sel.innerHTML='';
  const{s}=weekRange();const sd=new Date(s);for(let i=0;i<8;i++){const w=new Date(sd);w.setDate(sd.getDate()-7*i);const we=new Date(w);we.setDate(w.getDate()+6);const ws=[w.getFullYear(),String(w.getMonth()+1).padStart(2,'0'),String(w.getDate()).padStart(2,'0')].join('-');sel.innerHTML+=`<option value="${ws}">${(w.getMonth()+1)+'/'+w.getDate()}〜${(we.getMonth()+1)+'/'+we.getDate()}</option>`}genRpt()}
function closeRpt(){document.getElementById('rpt-modal').style.display='none'}
function genRpt(){const period=document.getElementById('rpt-period').value,needs=document.getElementById('rpt-needs').value,comment=document.getElementById('rpt-comment').value;
  if(!period)return;const rs=weekRecs(period);const s=new Date(period),e=new Date(s);e.setDate(s.getDate()+6);const label=(s.getMonth()+1)+'/'+s.getDate()+'('+DOW[s.getDay()]+')〜'+(e.getMonth()+1)+'/'+e.getDate()+'('+DOW[e.getDay()]+')';
  const k=kpi(rs),t=D.targets,fn=D.funnel;
  let bdg=0;rs.forEach(r=>{bdg+=D.budgets&&D.budgets[r.date]||0});
  const pm=curPromo();
  const ct={};rs.forEach(r=>{if(r.categories)Object.entries(r.categories).forEach(([c,v])=>{ct[c]=(ct[c]||0)+v})});
  const catL=Object.entries(ct).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`  ${c}: ${f$k(v)}${D.catTargets[c]?' (目標'+f$k(D.catTargets[c])+' '+rate(v,D.catTargets[c])+')':''}`).join('\n');
  let rpt=`【週次報告】${label}\n${'═'.repeat(24)}\n\n■ 売上\n  実績: ${f$k(k.sales)}`;
  if(bdg)rpt+=` / 予算${f$k(bdg)}（${k.sales>=bdg?'+':''}${f$k(k.sales-bdg)}）`;
  rpt+=`\n\n■ KPI\n  Traffic:${fN(k.traffic)} Trans:${fN(k.trans)}\n  CVR:${fP(k.cvr)}${t.cvr?' (目標'+fP(t.cvr)+') '+rate(k.cvr,t.cvr):''}\n  ATV:${f$(k.atv)}${t.atv?' (目標'+f$(t.atv)+') '+rate(k.atv,t.atv):''}\n  UPT:${k.upt>0?fD(k.upt):'-'}${t.upt?' (目標'+fD(t.upt)+') '+rate(k.upt,t.upt):''}`;
  rpt+=`\n\n■ 接客指標\n  AP率:${fP(k.apR)}${fn.ap?' '+rate(k.apR,fn.ap):''} SC率:${fP(k.scR)}\n  3デモ率:${fP(k.d3R)}${fn.d3?' '+rate(k.d3R,fn.d3):''} FC紹介率:${fP(k.fcR)}${fn.fc?' '+rate(k.fcR,fn.fc):''}`;
  if(pm){rpt+=`\n\n■ プロモ: ${pm.name}`;if(pm.actionItems)rpt+='\n'+pm.actionItems.map(a=>`  ${a.action} → ${a.kpi}`).join('\n')}
  if(needs)rpt+=`\n\n■ ニーズ\n  ${needs}`;
  if(comment)rpt+=`\n\n■ 振り返り\n  ${comment}`;
  if(catL)rpt+=`\n\n■ カテゴリ\n${catL}`;
  document.getElementById('rpt-out').innerHTML=`<button class="copy-btn" onclick="copyRpt()">コピー</button><div class="rpt-box" id="rpt-c">${rpt.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`}
function copyRpt(){const t=document.getElementById('rpt-c').textContent;navigator.clipboard.writeText(t).then(()=>alert('コピー！')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('コピー！')})}

// ===== SETTINGS =====
function rBdg(){const mi=document.getElementById('s-bdg-mo');if(!mi.value)mi.value=mK(new Date());const[y,m]=mi.value.split('-').map(Number);const days=new Date(y,m,0).getDate();
  let html='<table class="dt"><thead><tr><th>日</th><th>曜</th><th class="n">予算<span class="hint">(千円)</span></th><th class="n">客数</th></tr></thead><tbody>',totalS=0,totalT=0;
  for(let d=1;d<=days;d++){const ds=[y,String(m).padStart(2,'0'),String(d).padStart(2,'0')].join('-');const dow=DOW[new Date(y,m-1,d).getDay()];const val=D.budgets&&D.budgets[ds]||'';const tval=D.budgetTrans&&D.budgetTrans[ds]||'';if(val)totalS+=parseInt(val);if(tval)totalT+=parseInt(tval);const isWe=new Date(y,m-1,d).getDay()===0||new Date(y,m-1,d).getDay()===6;
    html+=`<tr style="${isWe?'background:#f5f9f5':''}"><td>${d}</td><td>${dow}</td><td class="n"><input type="number" data-bdg="${ds}" value="${val}" inputmode="numeric" style="width:60px;padding:4px;font-size:13px;border:1px solid var(--bd);border-radius:6px;text-align:right"></td><td class="n"><input type="number" data-bdgt="${ds}" value="${tval}" inputmode="numeric" style="width:50px;padding:4px;font-size:13px;border:1px solid var(--bd);border-radius:6px;text-align:right"></td></tr>`}
  html+='</tbody></table>';document.getElementById('bdg-grid').innerHTML=html;
  // Show calculated targets
  const avgAtv=D.targets.atv||4500;const avgUpt=D.targets.upt||2.5;
  const estTraffic=D.targets.cvr>0?Math.round(totalT/(D.targets.cvr/100)):0;
  document.getElementById('bdg-total').innerHTML=`売上: ${f$k(totalS)} / 客数: ${fN(totalT)}${estTraffic?` / 推定Traffic: ${fN(estTraffic)}(CVR${fP(D.targets.cvr)}換算)`:''}`}
function saveBdg(){if(!D.budgets)D.budgets={};if(!D.budgetTrans)D.budgetTrans={};
  document.querySelectorAll('[data-bdg]').forEach(e=>{const v=parseInt(e.value)||0;if(v)D.budgets[e.dataset.bdg]=v;else delete D.budgets[e.dataset.bdg]});
  document.querySelectorAll('[data-bdgt]').forEach(e=>{const v=parseInt(e.value)||0;if(v)D.budgetTrans[e.dataset.bdgt]=v;else delete D.budgetTrans[e.dataset.bdgt]});
  sv(D);alert('保存！')}
function rSet(){const t=D.targets,f=D.funnel||{};document.getElementById('s-bdg-mo').value=mK(new Date());rBdg();
  document.getElementById('s-cvr').value=t.cvr||'';document.getElementById('s-atv').value=t.atv||'';document.getElementById('s-upt').value=t.upt||'';
  document.getElementById('s-fap').value=f.ap||'';document.getElementById('s-fsc').value=f.sc||'';document.getElementById('s-fd3').value=f.d3||'';document.getElementById('s-ffc').value=f.fc||'';
  rCatSet();rStfCh();rMonthlyBdg()}
function rMonthlyBdg(){
  const sel=document.getElementById('mbd-year');
  if(!sel.innerHTML){const cy=new Date().getFullYear();sel.innerHTML=`<option value="${cy}">${cy}年</option><option value="${cy+1}">${cy+1}年</option><option value="${cy-1}">${cy-1}年</option>`}
  const year=parseInt(sel.value);
  let html='<table class="dt"><thead><tr><th>月</th><th class="n">予算(千円)</th></tr></thead><tbody>';
  for(let m=1;m<=12;m++){const mk=year+'-'+String(m).padStart(2,'0');const val=D.monthlyBudgets&&D.monthlyBudgets[mk]||'';
    html+=`<tr><td style="font-size:11px;font-weight:600">${m}月</td><td class="n"><input type="number" class="bk-i" data-mbd="${mk}" value="${val}" inputmode="numeric" placeholder="-"></td></tr>`}

function saveMonthlyBdg(){

  sv(D);alert('保存！')}
function saveTgt(){D.targets={cvr:parseFloat(document.getElementById('s-cvr').value)||0,atv:parseInt(document.getElementById('s-atv').value)||0,upt:parseFloat(document.getElementById('s-upt').value)||0};
  D.funnel={ap:parseFloat(document.getElementById('s-fap').value)||0,sc:parseFloat(document.getElementById('s-fsc').value)||0,d3:parseFloat(document.getElementById('s-fd3').value)||0,fc:parseFloat(document.getElementById('s-ffc').value)||0};
  D.catTargets={};document.querySelectorAll('[data-cattgt]').forEach(e=>{const v=parseInt(e.value)||0;if(v)D.catTargets[e.dataset.cattgt]=v});sv(D);alert('保存！')}
function rCatSet(){document.getElementById('cat-set').innerHTML=D.categories.map(c=>`<div class="fr" style="margin-bottom:4px;align-items:center"><span class="chip">${c}<button class="chip-x" onclick="rmCat('${c}')">×</button></span><input type="number" class="fi" data-cattgt="${c}" placeholder="目標(千円)" value="${D.catTargets&&D.catTargets[c]||''}" inputmode="numeric" style="flex:1;padding:6px;font-size:12px;margin-left:6px"></div>`).join('')}
function addCat(){const i=document.getElementById('nc'),n=i.value.trim();if(!n||D.categories.includes(n))return;D.categories.push(n);sv(D);i.value='';rCatSet()}
function rmCat(n){D.categories=D.categories.filter(c=>c!==n);delete D.catTargets[n];sv(D);rCatSet()}
function rStfCh(){document.getElementById('stf-ch').innerHTML=D.staff.map(s=>`<span class="chip">${s}<button class="chip-x" onclick="rmStf('${s}')">×</button></span>`).join('')}
function addStf(){const i=document.getElementById('ns'),n=i.value.trim();if(!n||D.staff.includes(n))return;D.staff.push(n);sv(D);i.value='';rStfCh()}
function rmStf(n){D.staff=D.staff.filter(s=>s!==n);sv(D);rStfCh()}
function expD(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='cosme-'+td()+'.json';a.click();URL.revokeObjectURL(u)}
function impD(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.records){D=d;sv(D);alert('完了');go('home')}else alert('無効')}catch{alert('失敗')}};r.readAsText(f);e.target.value=''}
function clrD(){if(confirm('全データ削除？')){localStorage.removeItem(SK);D=ld();go('set');alert('削除完了')}}
document.addEventListener('DOMContentLoaded',()=>rHome());
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
